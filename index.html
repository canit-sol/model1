<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Cesium Split Comparison</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
display:flex;
background:black;
font-family:sans-serif;
}

/* containers */

#masterContainer,
#slaveContainer{
width:50%;
height:100vh;
position:relative;
}

/* hide cesium credit */

.cesium-widget-credits{
display:none!important;
}

/* HOME BUTTON */

.home-btn{
position:absolute;
top:15px;
right:15px;
z-index:30;
width:36px;
height:36px;
background:rgba(0,0,0,0.7);
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border:1px solid rgba(255,255,255,0.15);
}

.home-btn:hover{
background:rgba(0,0,0,0.9);
}

/* OLD / NEW LABELS */

.old-label{
position:absolute;
bottom:15px;
left:15px;
background:rgba(0,0,0,0.7);
color:white;
padding:6px 12px;
border-radius:6px;
font-size:14px;
z-index:20;
}

.new-label{
position:absolute;
bottom:15px;
right:15px;
background:rgba(0,0,0,0.7);
color:white;
padding:6px 12px;
border-radius:6px;
font-size:14px;
z-index:20;
}

/* PANEL */

.panel{
position:absolute;
top:15px;
left:15px;
z-index:20;
background:rgba(0,0,0,0.92);
color:#fff;
padding:14px;
border-radius:12px;
width:260px;
border:1px solid rgba(255,255,255,0.10);
box-shadow:0 12px 28px rgba(0,0,0,0.65);
transition:transform 0.3s ease;
}

.panel.collapsed{
transform:translateX(-280px);
}

.panel-toggle{
position:absolute;
right:-40px;
top:50%;
transform:translateY(-50%);
width:40px;
height:60px;
background:rgba(0,0,0,0.92);
border:1px solid rgba(255,255,255,0.10);
border-left:none;
border-radius:0 12px 12px 0;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:#fff;
font-size:20px;
}

.model-title{
font-size:14px;
font-weight:600;
margin-bottom:10px;
padding-bottom:8px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.month-select{
width:100%;
padding:8px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.15);
background:#000;
color:#fff;
font-size:13px;
}

</style>
</head>

<body>

<!-- LEFT SIDE (FOLLOWER) -->
<div id="masterContainer">

<div class="old-label">OLD</div>

<div class="panel" id="controlPanel">

<div class="panel-toggle" id="panelToggle">›</div>

<div class="model-title">
Go 1 and 2 Housing (Tower A)
</div>

<select id="modelSelector" class="month-select">
<option value="4458928">Nov 2025</option>
<option value="4458928">Dec 2025</option>
</select>

</div>

</div>


<!-- RIGHT SIDE (MASTER / CONTROL) -->
<div id="slaveContainer">

<div class="home-btn" onclick="location.reload()">
<svg viewBox="0 0 24 24" width="18" height="18">
<path fill="white" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
</svg>
</div>

<div class="new-label">NEW</div>

</div>

<script type="module">

Cesium.Ion.defaultAccessToken="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJkZDVkZWIxMS0xZmI2LTQwMTEtODU0OS03MmViODc3YmE1ZmQiLCJpZCI6MzkxNjExLCJpYXQiOjE3NzE0MDk5MTh9.CbV7-X9bTD77ocxFH_iUDGVNja4Ju3JYxpFOcQv1AdE";

/* VIEWERS */

const masterViewer=new Cesium.Viewer("masterContainer",{
animation:false,
timeline:false,
baseLayerPicker:false,
geocoder:false,
homeButton:false,
sceneModePicker:false,
navigationHelpButton:false,
fullscreenButton:false,
infoBox:false,
selectionIndicator:false
});

const slaveViewer=new Cesium.Viewer("slaveContainer",{
animation:false,
timeline:false,
baseLayerPicker:false,
geocoder:false,
homeButton:false,
sceneModePicker:false,
navigationHelpButton:false,
fullscreenButton:false,
infoBox:false,
selectionIndicator:false
});

masterViewer.scene.globe.show=true;
slaveViewer.scene.globe.show=true;


/* DISABLE LEFT CONTROLS */

const masterController = masterViewer.scene.screenSpaceCameraController;

masterController.enableRotate=false;
masterController.enableZoom=false;
masterController.enableTranslate=false;
masterController.enableLook=false;

masterViewer.scene.screenSpaceCameraController.enableInputs=false;


/* TILES */

let masterTileset;
let slaveTileset;

async function loadInitialModels(){

masterTileset=await Cesium.Cesium3DTileset.fromIonAssetId(4458928);
slaveTileset=await Cesium.Cesium3DTileset.fromIonAssetId(4458928);

masterViewer.scene.primitives.add(masterTileset);
slaveViewer.scene.primitives.add(slaveTileset);

await slaveViewer.zoomTo(slaveTileset);
await masterViewer.zoomTo(masterTileset);


/* ZOOM LIMITS (RIGHT SIDE MASTER) */

const controller = slaveViewer.scene.screenSpaceCameraController;

controller.enableTilt = true;
controller.minimumZoomDistance = 50;
controller.maximumZoomDistance = 1300;

slaveViewer.scene.screenSpaceCameraController.zoomEventTypes = [
Cesium.CameraEventType.WHEEL
];

slaveViewer.scene.screenSpaceCameraController.zoomFactor = 4;

}

loadInitialModels();


/* CAMERA SYNC (RIGHT → LEFT) */

slaveViewer.camera.changed.addEventListener(function(){

masterViewer.camera.setView({
destination:slaveViewer.camera.position,
orientation:{
heading:slaveViewer.camera.heading,
pitch:slaveViewer.camera.pitch,
roll:slaveViewer.camera.roll
}
});

});


/* DROPDOWN SWITCH */

document.getElementById("modelSelector").addEventListener("change",async function(){

const selectedAssetId=parseInt(this.value);

masterViewer.scene.primitives.remove(masterTileset);

masterTileset=await Cesium.Cesium3DTileset.fromIonAssetId(selectedAssetId);

masterViewer.scene.primitives.add(masterTileset);

await masterViewer.zoomTo(masterTileset);

});


/* PANEL TOGGLE */

const toggle=document.getElementById("panelToggle");
const panel=document.getElementById("controlPanel");

toggle.onclick=()=>{
panel.classList.toggle("collapsed");
};

</script>

</body>
</html>
