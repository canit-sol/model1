<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cesium Split Comparison</title>

<!-- Cesium Library -->
<script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  display: flex;
  background: black;
  font-family: sans-serif;
}

/* Containers */
#masterContainer,
#slaveContainer {
  width: 50%;
  height: 100vh;
  position: relative;
}

/* OLD / NEW Labels */
.label {
  position: absolute;
  top: 15px;
  left: 20px;
  z-index: 10;
  color: white;
  font-size: 18px;
  font-weight: bold;
  background: rgba(0,0,0,0.6);
  padding: 6px 14px;
  border-radius: 6px;
}

/* Dropdown Toggle (right side of LEFT screen) */
#modelSelector {
  position: absolute;
  top: 60px;
  left: 20px;
  z-index: 10;
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.4);
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 14px;
  backdrop-filter: blur(6px);
  cursor: pointer;
}

/* Hide Cesium credits */
.cesium-widget-credits {
  display: none !important;
}
#resetView{
  position:absolute;
  top:110px;
  left:20px;
  z-index:10;
  padding:8px 14px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.4);
  background:rgba(0,0,0,0.6);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>
<button id="resetView">Reset View</button>

<!-- LEFT SIDE (OLD) -->
<div id="masterContainer">
  <div class="label">OLD</div>

  <select id="modelSelector">
    <option value="4458928">Nov 2025</option>
    <option value="4458928">Dec 2025</option>
  </select>
</div>

<!-- RIGHT SIDE (NEW) -->
<div id="slaveContainer">
  <div class="label">NEW</div>
</div>

<script type="module">

Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJkZDVkZWIxMS0xZmI2LTQwMTEtODU0OS03MmViODc3YmE1ZmQiLCJpZCI6MzkxNjExLCJpYXQiOjE3NzE0MDk5MTh9.CbV7-X9bTD77ocxFH_iUDGVNja4Ju3JYxpFOcQv1AdE";

// CREATE VIEWERS
const masterViewer = new Cesium.Viewer("masterContainer", {
  animation: false,
  timeline: false,
  baseLayerPicker: false,
  geocoder: false,
  homeButton: false,
  sceneModePicker: false,
  navigationHelpButton: false,
  fullscreenButton: false,
  infoBox: false,
  selectionIndicator: false
});

const slaveViewer = new Cesium.Viewer("slaveContainer", {
  animation: false,
  timeline: false,
  baseLayerPicker: false,
  geocoder: false,
  homeButton: false,
  sceneModePicker: false,
  navigationHelpButton: false,
  fullscreenButton: false,
  infoBox: false,
  selectionIndicator: false
});

// IMPORTANT: disable globe so no sky zoom
masterViewer.scene.globe.show = false;
slaveViewer.scene.globe.show = false;

document.getElementById("resetView").addEventListener("click", async function(){

//Reset view button changes
  await masterViewer.zoomTo(masterTileset);
  await slaveViewer.zoomTo(slaveTileset);
  const controller = masterViewer.scene.screenSpaceCameraController;
  controller.enableTilt = true;
  controller.minimumZoomDistance = 40;
  controller.maximumZoomDistance = 3300;
});

// Disable tilt (no going under model)
masterViewer.scene.screenSpaceCameraController.enableTilt = false;

// Lock slave controls
let masterTileset;
let slaveTileset;
const slaveController = slaveViewer.scene.screenSpaceCameraController;

slaveController.enableRotate = false;
slaveController.enableZoom = false;
slaveController.enableTranslate = false;
slaveController.enableTilt = true;
slaveController.enableLook = false;

// LOAD MODELS
async function loadInitialModels() {

  masterTileset = await Cesium.Cesium3DTileset.fromIonAssetId(4458928);
  slaveTileset  = await Cesium.Cesium3DTileset.fromIonAssetId(4458928);

  masterViewer.scene.primitives.add(masterTileset);
  slaveViewer.scene.primitives.add(slaveTileset);

  await masterViewer.zoomTo(masterTileset);
  await slaveViewer.zoomTo(slaveTileset);

// SIMPLE ZOOM LIMIT (after zoom)
const controller = masterViewer.scene.screenSpaceCameraController;
controller.enableTilt = true;  // don't go under model
controller.minimumZoomDistance = 50;   // stop too close
controller.maximumZoomDistance = 1300;  // stop too far
}
slaveViewer.scene.screenSpaceCameraController.enableInputs = false;
masterViewer.scene.screenSpaceCameraController.zoomEventTypes = [
    Cesium.CameraEventType.WHEEL
];
masterViewer.scene.screenSpaceCameraController.zoomFactor = 4;

loadInitialModels();

// SYNC MASTER → SLAVE
masterViewer.camera.changed.addEventListener(function () {
  slaveViewer.camera.setView({
    destination: masterViewer.camera.position,
    orientation: {
      heading: masterViewer.camera.heading,
      pitch: masterViewer.camera.pitch,
      roll: masterViewer.camera.roll
    }
  });
});
const controller = masterViewer.scene.screenSpaceCameraController;
controller.enableTilt = false;

// DROPDOWN SWITCH
document.getElementById("modelSelector").addEventListener("change", async function() {

  const selectedAssetId = parseInt(this.value);

  masterViewer.scene.primitives.remove(masterTileset);

  masterTileset = await Cesium.Cesium3DTileset.fromIonAssetId(selectedAssetId);
  masterViewer.scene.primitives.add(masterTileset);

  await masterViewer.zoomTo(masterTileset);
});
</script>

</body>
</html>
