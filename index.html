```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Cesium Split Comparison</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>

/* PAGE */

html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:sans-serif;
height:100%;
}

/* LEFT VIEW */

#masterContainer{
position:absolute;
left:0;
top:0;
width:50vw;
height:100vh;
}

/* RIGHT VIEW */

#slaveContainer{
position:absolute;
left:50vw;
top:0;
width:50vw;
height:100vh;
}

/* hide cesium credits */

.cesium-widget-credits{
display:none!important;
}

/* CENTER SPLIT LINE */

.split-line{
position:absolute;
top:0;
left:50vw;
width:2px;
height:100vh;
background:#ff7a00;
box-shadow:0 0 6px #ff7a00;
z-index:100;
pointer-events:none;
}

/* HOME BUTTON */

.home-btn{
position:absolute;
top:15px;
right:15px;
z-index:30;
width:36px;
height:36px;
background:rgba(0,0,0,0.7);
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border:1px solid rgba(255,255,255,0.15);
}

.home-btn:hover{
background:rgba(0,0,0,0.9);
}

/* OLD / NEW LABELS */

.view-label{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
z-index:25;

font-size:12px;
letter-spacing:2px;
font-weight:600;

color:white;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(4px);

padding:4px 12px;
border-radius:20px;
pointer-events:none;
}

/* SIDE PANEL */

.panel{
position:absolute;
top:15px;
left:15px;
z-index:20;
background:rgba(0,0,0,0.92);
color:#fff;
padding:14px;
border-radius:12px;
width:260px;
border:1px solid rgba(255,255,255,0.10);
box-shadow:0 12px 28px rgba(0,0,0,0.65);
transition:transform 0.3s ease;
}

.panel.collapsed{
transform:translateX(-280px);
}

.panel-toggle{
position:absolute;
right:-40px;
top:50%;
transform:translateY(-50%);
width:40px;
height:60px;
background:rgba(0,0,0,0.92);
border:1px solid rgba(255,255,255,0.10);
border-left:none;
border-radius:0 12px 12px 0;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:#fff;
font-size:20px;
}

.model-title{
font-size:14px;
font-weight:600;
margin-bottom:10px;
padding-bottom:8px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.month-select{
width:100%;
padding:8px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.15);
background:#000;
color:#fff;
font-size:13px;
}

</style>
</head>

<body>

<div class="split-line"></div>

<!-- LEFT VIEW -->

<div id="masterContainer">

<div class="view-label">OLD</div>

<div class="panel" id="controlPanel">

<div class="panel-toggle" id="panelToggle">›</div>

<div class="model-title">
Go 1 and 2 Housing (Tower A)
</div>

<select id="modelSelector" class="month-select">
<option value="4458928">Nov 2025</option>
<option value="4458928">Dec 2025</option>
</select>

</div>

</div>

<!-- RIGHT VIEW -->

<div id="slaveContainer">

<div class="home-btn" onclick="location.reload()">
<svg viewBox="0 0 24 24" width="18" height="18">
<path fill="white" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
</svg>
</div>

<div class="view-label">NEW</div>

</div>

<script type="module">

Cesium.Ion.defaultAccessToken="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJkZDVkZWIxMS0xZmI2LTQwMTEtODU0OS03MmViODc3YmE1ZmQiLCJpZCI6MzkxNjExLCJpYXQiOjE3NzE0MDk5MTh9.CbV7-X9bTD77ocxFH_iUDGVNja4Ju3JYxpFOcQv1AdE";

/* VIEWERS */

const leftViewer = new Cesium.Viewer("masterContainer",{
animation:false,
timeline:false,
baseLayerPicker:false,
geocoder:false,
homeButton:false,
sceneModePicker:false,
navigationHelpButton:false,
fullscreenButton:false,
infoBox:false,
selectionIndicator:false
});

const rightViewer = new Cesium.Viewer("slaveContainer",{
animation:false,
timeline:false,
baseLayerPicker:false,
geocoder:false,
homeButton:false,
sceneModePicker:false,
navigationHelpButton:false,
fullscreenButton:false,
infoBox:false,
selectionIndicator:false
});

let leftTileset;
let rightTileset;

/* LOAD MODELS */

async function loadInitialModels(){

leftTileset = await Cesium.Cesium3DTileset.fromIonAssetId(4458928);
rightTileset = await Cesium.Cesium3DTileset.fromIonAssetId(4458928);

leftViewer.scene.primitives.add(leftTileset);
rightViewer.scene.primitives.add(rightTileset);

await leftViewer.zoomTo(leftTileset);
await rightViewer.zoomTo(rightTileset);

/* CAMERA LIMITS */

const leftController = leftViewer.scene.screenSpaceCameraController;
const rightController = rightViewer.scene.screenSpaceCameraController;

leftController.enableTilt = true;
rightController.enableTilt = true;

leftController.minimumZoomDistance = 60;
rightController.minimumZoomDistance = 60;

leftController.maximumZoomDistance = 2500;
rightController.maximumZoomDistance = 2500;

leftController.zoomEventTypes = [Cesium.CameraEventType.WHEEL];
rightController.zoomEventTypes = [Cesium.CameraEventType.WHEEL];

leftController.zoomFactor = 4;
rightController.zoomFactor = 4;

}

loadInitialModels();

/* CAMERA SYNC */

let syncing=false;

leftViewer.scene.postRender.addEventListener(function(){

if(syncing) return;
syncing=true;

rightViewer.camera.setView({
destination:leftViewer.camera.position,
orientation:{
heading:leftViewer.camera.heading,
pitch:leftViewer.camera.pitch,
roll:leftViewer.camera.roll
}
});

syncing=false;

});

rightViewer.scene.postRender.addEventListener(function(){

if(syncing) return;
syncing=true;

leftViewer.camera.setView({
destination:rightViewer.camera.position,
orientation:{
heading:rightViewer.camera.heading,
pitch:rightViewer.camera.pitch,
roll:rightViewer.camera.roll
}
});

syncing=false;

});

/* DROPDOWN SWITCH */

document.getElementById("modelSelector").addEventListener("change",async function(){

const id=parseInt(this.value);

leftViewer.scene.primitives.remove(leftTileset);

leftTileset=await Cesium.Cesium3DTileset.fromIonAssetId(id);

leftViewer.scene.primitives.add(leftTileset);

await leftViewer.zoomTo(leftTileset);

});

/* PANEL TOGGLE */

const toggle=document.getElementById("panelToggle");
const panel=document.getElementById("controlPanel");

toggle.onclick=()=>panel.classList.toggle("collapsed");

</script>

</body>
</html>
